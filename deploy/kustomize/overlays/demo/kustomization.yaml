apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Demo overlay — IP-only access, hostless Traefik Ingress + Basic Auth + self-signed TLS.
# Targets k3s cluster at <SERVER_IP>.
#
# Secret management (NOT tracked in git — run on server):
#   /opt/iiot/secrets/basic-auth-password.txt  — generated by setup (chmod 600)
#   /opt/iiot/secrets/users                    — htpasswd bcrypt file
#   /opt/iiot/tls/tls.crt / tls.key           — self-signed cert with IP SAN
#
# To re-apply from this overlay on the server:
#   kubectl apply -f /opt/iiot/manifests/12-basicauth-middleware.yaml
#   kubectl apply -f /opt/iiot/manifests/10-ingress.yaml

namespace: iiot

resources:
  - ../../base
  - 12-basicauth-middleware.yaml
  - 10-ingress.yaml

images:
  - name: iiot-collector
    newName: ghcr.io/al1mk/iiot-edge-platform-golang/collector
    newTag: v0.1.2
  - name: iiot-ingestor
    newName: ghcr.io/al1mk/iiot-edge-platform-golang/ingestor
    newTag: v0.1.2
  - name: iiot-mqtt-bridge
    newName: ghcr.io/al1mk/iiot-edge-platform-golang/mqtt-bridge
    newTag: v0.1.2
